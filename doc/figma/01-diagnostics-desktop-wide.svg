<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="750" viewBox="0 0 1100 750">
  <defs>
    <style>
      text { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .t-primary { fill: #E0E0E0; }
      .t-secondary { fill: #A0A0B8; }
      .t-cyan { fill: #00BCD4; }
      .t-blue { fill: #0078D4; }
      .t-pass { fill: #4ADE80; }
      .t-warn { fill: #FACC15; }
      .t-fail { fill: #EF4444; }
      .t-skip { fill: #888888; }
      .t-dim { fill: #A0A0B8; opacity: 0.6; }
      .t-mono { font-family: 'JetBrains Mono', monospace; }
      .t-12 { font-size: 12px; }
      .t-11 { font-size: 11px; }
      .t-10 { font-size: 10px; }
      .t-9 { font-size: 9px; }
    </style>
  </defs>

  <!-- Scaffold background #1E1E2E -->
  <rect width="1100" height="750" fill="#1E1E2E"/>

  <!-- ── Sidebar 260px bg #252538 ── -->
  <rect x="0" y="0" width="260" height="750" fill="#252538"/>

  <!-- Sidebar header -->
  <rect x="0" y="0" width="260" height="49" fill="none" stroke="#3A3A5A" stroke-width="1"/>
  <text x="16" y="30" font-size="16" font-weight="700" fill="#E0E0E0">NetDiagnostic</text>

  <!-- Target label -->
  <text x="16" y="76" font-size="11" font-weight="600" fill="#A0A0B8" letter-spacing="0.6">Target</text>

  <!-- Target input field -->
  <rect x="12" y="84" width="236" height="40" rx="8" fill="rgba(30,30,46,0.6)" stroke="#3A3A5A" stroke-width="1"/>
  <text x="22" y="108" font-size="12" fill="rgba(160,160,184,0.4)">Enter URL, IP address, or hostname...</text>

  <!-- Run + Cancel buttons -->
  <rect x="12" y="132" width="182" height="38" rx="8" fill="#0078D4"/>
  <text x="48" y="155" font-size="12" font-weight="600" fill="#FFFFFF">▶ Run Diagnostics</text>
  <rect x="200" y="132" width="48" height="38" rx="8" fill="none" stroke="rgba(239,68,68,0.5)" stroke-width="1"/>
  <text x="210" y="155" font-size="11" fill="#EF4444">■ Stop</text>

  <!-- Diagnosis Group label -->
  <text x="16" y="201" font-size="11" font-weight="600" fill="#A0A0B8" letter-spacing="0.8">Diagnosis Group</text>

  <!-- G1-G5 checkboxes -->
  <rect x="12" y="209" width="236" height="28" rx="6" fill="rgba(0,120,212,0.12)"/>
  <rect x="20" y="216" width="16" height="16" rx="3" fill="#0078D4"/>
  <text x="42" y="229" font-size="12" font-weight="600" fill="#E0E0E0">G1 System &amp; Adapters</text>

  <rect x="12" y="239" width="236" height="28" rx="6" fill="transparent"/>
  <rect x="20" y="246" width="16" height="16" rx="3" fill="none" stroke="#5A5A7A" stroke-width="1.5"/>
  <text x="42" y="259" font-size="12" font-weight="400" fill="#A0A0B8">G2 Connectivity &amp; Security</text>

  <rect x="12" y="269" width="236" height="28" rx="6" fill="transparent"/>
  <rect x="20" y="276" width="16" height="16" rx="3" fill="none" stroke="#5A5A7A" stroke-width="1.5"/>
  <text x="42" y="289" font-size="12" font-weight="400" fill="#A0A0B8">G3 Internet &amp; DNS</text>

  <rect x="12" y="299" width="236" height="28" rx="6" fill="transparent"/>
  <rect x="20" y="306" width="16" height="16" rx="3" fill="none" stroke="#5A5A7A" stroke-width="1.5"/>
  <text x="42" y="319" font-size="12" font-weight="400" fill="#A0A0B8">G4 Remote Host</text>

  <rect x="12" y="329" width="236" height="28" rx="6" fill="transparent"/>
  <rect x="20" y="336" width="16" height="16" rx="3" fill="none" stroke="#5A5A7A" stroke-width="1.5"/>
  <text x="42" y="349" font-size="12" font-weight="400" fill="#A0A0B8">G5 Website / URL</text>

  <!-- Port Scan card -->
  <rect x="12" y="369" width="236" height="108" rx="8" fill="rgba(22,33,62,0.5)" stroke="rgba(0,120,212,0.3)" stroke-width="1"/>
  <text x="22" y="389" font-size="11" font-weight="600" fill="#0078D4">Port Scan</text>
  <rect x="22" y="398" width="16" height="16" rx="3" fill="#00BCD4"/>
  <text x="44" y="411" font-size="11" fill="#E0E0E0">Scan Common Ports</text>
  <text x="22" y="433" font-size="11" fill="#A0A0B8">Range:</text>
  <rect x="22" y="440" width="104" height="28" rx="4" fill="none" stroke="#3A3A5A" stroke-width="1"/>
  <text x="30" y="458" font-size="11" fill="#A0A0B8">From</text>
  <text x="132" y="458" font-size="13" fill="#A0A0B8">–</text>
  <rect x="144" y="440" width="104" height="28" rx="4" fill="none" stroke="#3A3A5A" stroke-width="1"/>
  <text x="152" y="458" font-size="11" fill="#A0A0B8">To</text>

  <!-- Divider -->
  <line x1="12" y1="497" x2="248" y2="497" stroke="#3A3A5A" stroke-width="1"/>

  <!-- Summary cards -->
  <text x="16" y="520" font-size="11" font-weight="600" fill="#A0A0B8" letter-spacing="0.6">Summary</text>
  <text x="210" y="520" font-size="10" fill="#A0A0B8">Total: 38</text>

  <!-- Pass card -->
  <rect x="12" y="528" width="112" height="46" rx="8" fill="rgba(74,222,128,0.08)" stroke="rgba(74,222,128,0.25)" stroke-width="1"/>
  <text x="22" y="558" font-size="20" font-weight="700" fill="#4ADE80">32</text>
  <text x="22" y="570" font-size="9" font-weight="500" fill="rgba(160,160,184,0.8)">Pass</text>

  <!-- Warn card -->
  <rect x="128" y="528" width="112" height="46" rx="8" fill="rgba(250,204,21,0.08)" stroke="rgba(250,204,21,0.25)" stroke-width="1"/>
  <text x="138" y="558" font-size="20" font-weight="700" fill="#FACC15">3</text>
  <text x="138" y="570" font-size="9" font-weight="500" fill="rgba(160,160,184,0.8)">Warning</text>

  <!-- Fail card -->
  <rect x="12" y="580" width="112" height="46" rx="8" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.25)" stroke-width="1"/>
  <text x="22" y="610" font-size="20" font-weight="700" fill="#EF4444">1</text>
  <text x="22" y="622" font-size="9" font-weight="500" fill="rgba(160,160,184,0.8)">Fail</text>

  <!-- Skip card -->
  <rect x="128" y="580" width="112" height="46" rx="8" fill="rgba(136,136,136,0.08)" stroke="rgba(136,136,136,0.25)" stroke-width="1"/>
  <text x="138" y="610" font-size="20" font-weight="700" fill="#888888">2</text>
  <text x="138" y="622" font-size="9" font-weight="500" fill="rgba(160,160,184,0.8)">Skipped</text>

  <!-- ── Vertical divider ── -->
  <rect x="260" y="0" width="1" height="750" fill="#3A3A5A"/>

  <!-- ── Content area ── -->

  <!-- Content header bar bg #1A1A2E -->
  <rect x="261" y="0" width="839" height="41" fill="#1A1A2E"/>
  <rect x="261" y="40" width="839" height="1" fill="#3A3A5A"/>
  <text x="279" y="26" font-size="15" font-weight="600" fill="#E0E0E0">Results</text>
  <rect x="1000" y="8" width="80" height="26" rx="6" fill="none" stroke="#5A5A7A" stroke-width="1"/>
  <text x="1012" y="25" font-size="12" fill="#A0A0B8">↻ Reset</text>

  <!-- ── Group G1 Card ── -->
  <rect x="269" y="49" width="823" height="80" rx="10" fill="#16213E" stroke="#2A2A4A" stroke-width="1"/>
  <!-- accent bar -->
  <rect x="281" y="57" width="3" height="20" rx="2" fill="#0078D4"/>
  <text x="294" y="72" font-size="13" font-weight="600" fill="#E0E0E0">G1 System &amp; Adapters</text>
  <text x="1020" y="72" font-size="11" font-weight="500" fill="#A0A0B8">7/7</text>
  <!-- badges -->
  <rect x="1050" y="60" width="18" height="16" rx="4" fill="rgba(74,222,128,0.15)"/>
  <text x="1055" y="72" font-size="10" font-weight="700" fill="#4ADE80">7</text>
  <!-- progress bar -->
  <rect x="281" y="85" width="799" height="3" rx="2" fill="#2A2A4A"/>
  <rect x="281" y="85" width="799" height="3" rx="2" fill="#4ADE80"/>
  <!-- test rows -->
  <text x="281" y="108" font-size="12" font-weight="500" fill="#E0E0E0">Network Adapters</text>
  <text x="1050" y="108" font-size="10" fill="#A0A0B8">120ms</text>
  <text x="281" y="122" font-size="12" font-weight="500" fill="#E0E0E0">WiFi</text>
  <rect x="440" y="111" width="90" height="14" rx="3" fill="#2A2A4A"/>
  <text x="444" y="121" font-size="9" fill="#A0A0B8">SSID: MyWiFi</text>
  <rect x="534" y="111" width="96" height="14" rx="3" fill="#2A2A4A"/>
  <text x="538" y="121" font-size="9" fill="#A0A0B8">Signal: -47dBm</text>
  <text x="1050" y="122" font-size="10" fill="#A0A0B8">340ms</text>

  <!-- ── Group G5 Card (running) ── -->
  <rect x="269" y="137" width="823" height="80" rx="10" fill="#16213E" stroke="rgba(0,188,212,0.4)" stroke-width="1"/>
  <rect x="281" y="145" width="3" height="20" rx="2" fill="#00BCD4"/>
  <text x="294" y="160" font-size="13" font-weight="600" fill="#E0E0E0">G5 Website / URL</text>
  <text x="1020" y="160" font-size="11" font-weight="500" fill="#A0A0B8">12/13</text>
  <rect x="1050" y="148" width="18" height="16" rx="4" fill="rgba(74,222,128,0.15)"/>
  <text x="1055" y="160" font-size="10" font-weight="700" fill="#4ADE80">11</text>
  <rect x="1070" y="148" width="18" height="16" rx="4" fill="rgba(250,204,21,0.15)"/>
  <text x="1075" y="160" font-size="10" font-weight="700" fill="#FACC15">1</text>
  <text x="560" y="160" font-size="10" font-style="italic" fill="#00BCD4">Running: HTTP Timing...</text>
  <rect x="281" y="173" width="799" height="3" rx="2" fill="#2A2A4A"/>
  <rect x="281" y="173" width="735" height="3" rx="2" fill="#00BCD4"/>
  <text x="281" y="196" font-size="12" font-weight="500" fill="#E0E0E0">URL Parsing</text>
  <text x="1050" y="196" font-size="10" fill="#A0A0B8">5ms</text>
  <text x="281" y="210" font-size="12" font-weight="500" fill="#E0E0E0">TCP Connect</text>
  <text x="1050" y="210" font-size="10" fill="#A0A0B8">45ms</text>

  <!-- ── Bottom status bar bg #1A1A2E ── -->
  <rect x="261" y="710" width="839" height="40" fill="#1A1A2E"/>
  <rect x="261" y="710" width="839" height="1" fill="#3A3A5A"/>
  <circle cx="285" cy="730" r="7" fill="none" stroke="#00BCD4" stroke-width="2" stroke-dasharray="33 11"/>
  <text x="301" y="735" font-size="12" font-weight="600" fill="#00BCD4">Running</text>
  <text x="600" y="735" font-size="11" font-style="italic" fill="#00BCD4">HTTP Timing...</text>
  <text x="1070" y="735" font-size="11" font-weight="600" fill="#A0A0B8">35 / 38</text>

  <!-- ── Measurement annotations ── -->
  <line x1="260" y1="0" x2="260" y2="750" stroke="rgba(0,188,212,0.4)" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="240" y="380" font-size="9" fill="#00BCD4" text-anchor="end">260px sidebar</text>
  <text x="119" y="748" font-size="9" fill="#00BCD4">1100 x 750 (Desktop Wide &ge;600px)</text>
</svg>
