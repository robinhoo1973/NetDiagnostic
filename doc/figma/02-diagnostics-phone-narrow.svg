<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <defs>
    <style>
      text { font-family: 'JetBrains Mono', monospace; }
      .tp { fill: #E0E0E0; } .ts { fill: #A0A0B8; } .tc { fill: #00BCD4; }
      .tb { fill: #0078D4; } .tg { fill: #4ADE80; } .ty { fill: #FACC15; }
      .tr { fill: #EF4444; } .tsk { fill: #888888; }
    </style>
  </defs>

  <!-- Scaffold #1E1E2E -->
  <rect width="375" height="812" fill="#1E1E2E"/>

  <!-- Status bar -->
  <rect x="0" y="0" width="375" height="24" fill="#1A1A2E"/>

  <!-- Content header -->
  <rect x="0" y="24" width="375" height="36" fill="#1A1A2E"/>
  <rect x="0" y="59" width="375" height="1" fill="#3A3A5A"/>
  <text x="12" y="47" font-size="14" font-weight="600" fill="#E0E0E0">Results</text>

  <!-- Results area (content upper) -->
  <rect x="0" y="60" width="375" height="286" fill="#1E1E2E"/>
  <text x="80" y="190" font-size="13" fill="rgba(160,160,184,0.6)" text-anchor="middle">Enter a target and press Run</text>
  <text x="80" y="210" font-size="11" fill="rgba(160,160,184,0.4)" text-anchor="middle">Analyze your network</text>

  <!-- Divider -->
  <rect x="0" y="346" width="375" height="1" fill="#3A3A5A"/>

  <!-- Sidebar area (content lower) bg #252538 -->
  <rect x="0" y="347" width="375" height="406" fill="#252538"/>

  <!-- Target input -->
  <text x="12" y="372" font-size="11" font-weight="600" fill="#A0A0B8" letter-spacing="0.6">Target</text>
  <rect x="12" y="380" width="351" height="38" rx="8" fill="rgba(30,30,46,0.6)" stroke="#3A3A5A" stroke-width="1"/>
  <text x="22" y="404" font-size="12" fill="rgba(160,160,184,0.4)">Enter URL, IP address, or hostname...</text>

  <!-- Run button -->
  <rect x="12" y="426" width="351" height="38" rx="8" fill="#0078D4"/>
  <text x="140" y="449" font-size="12" font-weight="600" fill="#FFFFFF">▶ Run Diagnostics</text>

  <!-- Layer checkboxes (compact view) -->
  <text x="12" y="492" font-size="11" font-weight="600" fill="#A0A0B8" letter-spacing="0.8">Diagnosis Group</text>
  <rect x="12" y="500" width="351" height="26" rx="6" fill="rgba(0,120,212,0.12)"/>
  <rect x="20" y="506" width="14" height="14" rx="3" fill="#0078D4"/>
  <text x="40" y="518" font-size="11" font-weight="600" fill="#E0E0E0">G1-G5 All Layers</text>

  <!-- Port scan -->
  <rect x="12" y="536" width="351" height="54" rx="8" fill="rgba(22,33,62,0.5)" stroke="rgba(0,120,212,0.3)" stroke-width="1"/>
  <text x="22" y="554" font-size="11" font-weight="600" fill="#0078D4">Port Scan</text>
  <rect x="22" y="562" width="14" height="14" rx="3" fill="#00BCD4"/>
  <text x="42" y="574" font-size="11" fill="#E0E0E0">Scan Common Ports</text>

  <!-- Summary cards (compact) -->
  <line x1="12" y1="606" x2="363" y2="606" stroke="#3A3A5A" stroke-width="1"/>
  <text x="16" y="626" font-size="11" font-weight="600" fill="#A0A0B8" letter-spacing="0.6">Summary</text>
  <text x="320" y="626" font-size="10" fill="#A0A0B8">Total: 38</text>

  <rect x="12" y="636" width="170" height="42" rx="8" fill="rgba(74,222,128,0.08)" stroke="rgba(74,222,128,0.25)"/>
  <text x="22" y="664" font-size="18" font-weight="700" fill="#4ADE80">30</text>
  <text x="22" y="675" font-size="8" fill="rgba(160,160,184,0.8)">Pass</text>

  <rect x="190" y="636" width="170" height="42" rx="8" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.25)"/>
  <text x="200" y="664" font-size="18" font-weight="700" fill="#EF4444">2</text>
  <text x="200" y="675" font-size="8" fill="rgba(160,160,184,0.8)">Fail</text>

  <rect x="12" y="684" width="170" height="42" rx="8" fill="rgba(250,204,21,0.08)" stroke="rgba(250,204,21,0.25)"/>
  <text x="22" y="712" font-size="18" font-weight="700" fill="#FACC15">3</text>
  <text x="22" y="723" font-size="8" fill="rgba(160,160,184,0.8)">Warning</text>

  <rect x="190" y="684" width="170" height="42" rx="8" fill="rgba(136,136,136,0.08)" stroke="rgba(136,136,136,0.25)"/>
  <text x="200" y="712" font-size="18" font-weight="700" fill="#888888">3</text>
  <text x="200" y="723" font-size="8" fill="rgba(160,160,184,0.8)">Skipped</text>

  <!-- Bottom status -->
  <rect x="0" y="772" width="375" height="40" fill="#1A1A2E"/>
  <rect x="0" y="772" width="375" height="1" fill="#3A3A5A"/>
  <text x="16" y="796" font-size="12" fill="#A0A0B8">○ Ready</text>

  <!-- Device frame annotation -->
  <text x="187" y="808" font-size="8" fill="#00BCD4" text-anchor="middle">375 x 812 (Phone Narrow &lt;600px)</text>
</svg>
