<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="700" viewBox="0 0 1100 700">
  <defs>
    <style>
      text { font-family: 'JetBrains Mono', monospace; }
      .tp { fill: #E0E0E0; } .ts { fill: #A0A0B8; } .tc { fill: #00BCD4; } .tb { fill: #0078D4; }
    </style>
  </defs>

  <rect width="1100" height="700" fill="#1E1E2E"/>

  <!-- AppBar -->
  <rect x="0" y="0" width="1100" height="48" fill="#1A1A2E"/>
  <text x="20" y="31" font-size="20" font-weight="600" fill="#E0E0E0">Test Configuration</text>

  <!-- TabBar -->
  <rect x="0" y="48" width="1100" height="38" fill="#1A1A2E"/>
  <rect x="0" y="85" width="1100" height="1" fill="#3A3A5A"/>
  <text x="40" y="72" font-size="12" font-weight="600" fill="#00BCD4">G1</text>
  <rect x="32" y="83" width="32" height="2" fill="#00BCD4"/>
  <text x="90" y="72" font-size="12" fill="#A0A0B8">G2</text>
  <text x="140" y="72" font-size="12" fill="#A0A0B8">G3</text>
  <text x="190" y="72" font-size="12" fill="#A0A0B8">G4</text>
  <text x="240" y="72" font-size="12" fill="#A0A0B8">G5</text>

  <!-- Action bar -->
  <rect x="0" y="87" width="1100" height="44" fill="rgba(22,33,62,0.5)"/>
  <rect x="0" y="130" width="1100" height="1" fill="#2A2A4A"/>
  <text x="20" y="105" font-size="14" font-weight="600" fill="#E0E0E0">System &amp; Adapters</text>
  <text x="20" y="120" font-size="11" fill="#A0A0B8">7 tests</text>
  <rect x="920" y="95" width="80" height="28" rx="6" fill="none" stroke="#3A3A5A" stroke-width="1"/>
  <text x="932" y="113" font-size="11" fill="#E0E0E0">Select All</text>
  <rect x="1008" y="95" width="80" height="28" rx="6" fill="none" stroke="#3A3A5A" stroke-width="1"/>
  <text x="1014" y="113" font-size="11" fill="#E0E0E0">Deselect</text>

  <!-- Test list items -->
  <!-- Item 1 (enabled) -->
  <rect x="0" y="131" width="1100" height="44" fill="transparent"/>
  <rect x="0" y="174" width="1100" height="1" fill="#2A2A4A"/>
  <text x="20" y="152" font-size="20" fill="#0078D4">✓</text>
  <text x="52" y="148" font-size="13" font-weight="500" fill="#E0E0E0">Network Adapters</text>
  <text x="52" y="164" font-size="11" fill="rgba(160,160,184,0.6)">Enumerate all network interfaces and their properties</text>
  <rect x="1040" y="141" width="44" height="24" rx="12" fill="#0078D4"/>
  <circle cx="1062" cy="153" r="10" fill="#FFFFFF"/>

  <!-- Item 2 (disabled) -->
  <rect x="0" y="175" width="1100" height="44" fill="transparent"/>
  <rect x="0" y="218" width="1100" height="1" fill="#2A2A4A"/>
  <text x="20" y="196" font-size="20" fill="#5A5A7A">○</text>
  <text x="52" y="192" font-size="13" font-weight="500" fill="#E0E0E0">WiFi</text>
  <text x="52" y="208" font-size="11" fill="rgba(160,160,184,0.6)">Wireless interface diagnostics and signal analysis</text>
  <rect x="1040" y="185" width="44" height="24" rx="12" fill="#2A2A4A"/>
  <circle cx="1052" cy="197" r="10" fill="#5A5A7A"/>

