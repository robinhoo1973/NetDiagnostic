  <rect x="0" y="263" width="1100" height="44" fill="transparent"/>
  <rect x="0" y="306" width="1100" height="1" fill="#2A2A4A"/>
  <text x="20" y="284" font-size="20" fill="#0078D4">✓</text>
  <text x="52" y="280" font-size="13" font-weight="500" fill="#E0E0E0">DHCP Status</text>
  <text x="52" y="296" font-size="11" fill="rgba(160,160,184,0.6)">DHCP lease information and configuration</text>
  <rect x="1040" y="273" width="44" height="24" rx="12" fill="#0078D4"/>
  <circle cx="1062" cy="285" r="10" fill="#FFFFFF"/>

  <!-- Item 5 -->
  <rect x="0" y="307" width="1100" height="44" fill="transparent"/>
  <rect x="0" y="350" width="1100" height="1" fill="#2A2A4A"/>
  <text x="20" y="328" font-size="20" fill="#0078D4">✓</text>
  <text x="52" y="324" font-size="13" font-weight="500" fill="#E0E0E0">IP Config</text>
  <text x="1040" y="317" width="44" height="24" rx="12" fill="#0078D4"/>
  <circle cx="1062" cy="329" r="10" fill="#FFFFFF"/>

  <!-- Item 6 -->
  <rect x="0" y="351" width="1100" height="44" fill="transparent"/>
  <rect x="0" y="394" width="1100" height="1" fill="#2A2A4A"/>
  <text x="20" y="372" font-size="20" fill="#0078D4">✓</text>
  <text x="52" y="368" font-size="13" font-weight="500" fill="#E0E0E0">Active Connections</text>
  <rect x="1040" y="361" width="44" height="24" rx="12" fill="#0078D4"/>
  <circle cx="1062" cy="373" r="10" fill="#FFFFFF"/>

  <text x="550" y="696" font-size="9" fill="#00BCD4" text-anchor="middle">Config Screen — TabBar (5 tabs G1-G5) — indicatorColor #00BCD4 — action bar — SwitchListTile items</text>
</svg>
