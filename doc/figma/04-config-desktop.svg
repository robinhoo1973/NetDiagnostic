  <text x="52" y="236" font-size="13" font-weight="500" fill="#E0E0E0">Wired</text>
  <text x="52" y="252" font-size="11" fill="rgba(160,160,184,0.6)">Ethernet adapter diagnostics and link status</text>
  <rect x="1040" y="229" width="44" height="24" rx="12" fill="#0078D4"/>
  <circle cx="1062" cy="241" r="10" fill="#FFFFFF"/>

