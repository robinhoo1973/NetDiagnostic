<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="700" viewBox="0 0 1100 700">
  <defs>
    <style>
      text { font-family: 'JetBrains Mono', monospace; }
      .tp { fill: #E0E0E0; } .ts { fill: #A0A0B8; } .tc { fill: #00BCD4; } .tb { fill: #0078D4; } .tr { fill: #EF4444; }
    </style>
  </defs>

  <!-- Scaffold #2D2D2D (different!) -->
  <rect width="1100" height="700" fill="#2D2D2D"/>

  <!-- AppBar #1A1A2E elevation 2 -->
  <rect x="0" y="0" width="1100" height="48" fill="#1A1A2E"/>
  <text x="20" y="31" font-size="16" font-weight="600" fill="#E0E0E0">NetDiagnostic Simulator</text>

  <!-- Device selector -->
  <rect x="900" y="10" width="140" height="28" rx="8" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.15)"/>
  <text x="914" y="29" font-size="12" fill="#FFFFFF">iPhone 15 Pro ▼</text>

  <!-- Rotate btn -->
  <rect x="1048" y="12" width="24" height="24" rx="4" fill="none" stroke="rgba(255,255,255,0.3)"/>
  <text x="1054" y="29" font-size="14" fill="rgba(255,255,255,0.7)">↻</text>

  <!-- Centered device frame -->
  <rect x="385" y="110" width="330" height="520" rx="32" fill="#000000" stroke="#333" stroke-width="2"/>
  <!-- Screen -->
  <rect x="401" y="136" width="298" height="468" rx="16" fill="#1E1E2E"/>
  <!-- Notch -->
  <rect x="495" y="136" width="110" height="22" rx="11" fill="#000000"/>
  <!-- Content in device -->
  <rect x="405" y="164" width="290" height="36" fill="#1A1A2E"/>
  <text x="415" y="186" font-size="11" font-weight="600" fill="#E0E0E0">Results</text>
  <rect x="405" y="200" width="290" height="1" fill="#3A3A5A"/>
  <text x="500" y="350" font-size="11" fill="rgba(160,160,184,0.6)" text-anchor="middle">Enter a target</text>
  <text x="500" y="368" font-size="10" fill="rgba(160,160,184,0.4)" text-anchor="middle">and press Run</text>
  <!-- Bottom status in device -->
  <rect x="405" y="570" width="290" height="30" fill="#1A1A2E"/>
  <rect x="405" y="570" width="290" height="1" fill="#3A3A5A"/>
  <text x="415" y="590" font-size="10" fill="#A0A0B8">○ Ready</text>

  <!-- Scale controls -->
  <text x="385" y="100" font-size="10" fill="#A0A0B8">Scale: 1.0x (min 0.3x – max 2.5x)</text>

  <text x="550" y="696" font-size="9" fill="#00BCD4" text-anchor="middle">Simulator Screen — bg #2D2D2D — device frame with InteractiveViewer (minScale 0.3, maxScale 2.5)</text>
</svg>
