name: Deploy iOS to TestFlight

on:
  # Trigger after the main Build & Release workflow succeeds
  workflow_run:
    workflows: ["Build & Release"]
    types: [completed]
    branches: [master]
  # Allow manual trigger (for testing / first-time setup)
  workflow_dispatch:

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  # Single job: check/create app → build → sign → upload
  # ═══════════════════════════════════════════════════════════════════════
  deploy-ios:
    name: Deploy iOS to TestFlight
    runs-on: macos-latest
    # Only run when the triggering build workflow succeeded, or on manual dispatch
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    env:
      QT_VERSION: "6.5.3"
      BUNDLE_ID: "com.robinhu.netdiagnostic"
      APP_NAME: "NetDiagnostic"
      APP_SKU: "netdiag.ios.001"
      APP_LOCALE: "en-US"
      QT_INSTALL_DIR: "/opt/qt-ios"
      ASC_KEY_DIR: "/tmp/asc-keys"

    steps:
      # ─────────────────────────────────────────────────────────────────
      # Checkout
      # ─────────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────────────────
      # Install build tools
      # ─────────────────────────────────────────────────────────────────
      - name: Install homebrew dependencies
        run: brew install cmake ninja curl python3

      # ─────────────────────────────────────────────────────────────────
      # Cache & install Qt 6 for iOS
      # ─────────────────────────────────────────────────────────────────
      - name: Cache Qt 6 iOS
        id: cache-qt-ios
        uses: actions/cache@v4
        with:
          path: ${{ env.QT_INSTALL_DIR }}
          key: qt6-ios-${{ env.QT_VERSION }}-v2

      - name: Install Qt 6 for iOS via aqt
        if: steps.cache-qt-ios.outputs.cache-hit != 'true'
        run: |
          pip3 install aqtinstall
          aqt install-qt mac ios $QT_VERSION ios -O $QT_INSTALL_DIR

      # ─────────────────────────────────────────────────────────────────
      # Write ASC private key to file
      # ─────────────────────────────────────────────────────────────────
      - name: Prepare App Store Connect key
        run: |
          mkdir -p "$ASC_KEY_DIR"
          echo "${{ secrets.APPSTORE_CONNECT_API_KEY }}" > "$ASC_KEY_DIR/key.p8"
          chmod 600 "$ASC_KEY_DIR/key.p8"

      # ─────────────────────────────────────────────────────────────────
      # Generate JWT & ensure app exists in App Store Connect
      # ─────────────────────────────────────────────────────────────────
      - name: Ensure App Store Connect app exists
        id: asc-app
        run: |
          source scripts/ios/asc-app.sh

          echo "Generating JWT..."
          JWT=$(asc_jwt \
            "${{ secrets.APPSTORE_CONNECT_KEY_ID }}" \
            "${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}" \
            "$ASC_KEY_DIR/key.p8")

          echo "Checking / creating App Store Connect app..."
          APP_ID=$(asc_app_ensure "$JWT" "$APP_NAME" "$BUNDLE_ID" "$APP_SKU" "$APP_LOCALE")

          echo "app_id=${APP_ID}" >> "$GITHUB_OUTPUT"
          echo "✅ App Store Connect app ready (id: ${APP_ID})"

      # ─────────────────────────────────────────────────────────────────
      # Import code signing certificate
      # ─────────────────────────────────────────────────────────────────
      - name: Import iOS distribution certificate
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"

          # Decode and import distribution certificate (.p12)
          echo "${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}" | base64 -d > "$RUNNER_TEMP/dist-cert.p12"
          security import "$RUNNER_TEMP/dist-cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}" \
            -A -T /usr/bin/codesign -T /usr/bin/xcodebuild

          # Allow codesign to access the keychain without prompt
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" > /dev/null 2>&1

          echo "✅ Distribution certificate imported"

      # ─────────────────────────────────────────────────────────────────
      # Install provisioning profile
      # ─────────────────────────────────────────────────────────────────
      - name: Install provisioning profile
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"

          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/profile.mobileprovision"

          # Extract UUID from provisioning profile
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin \
            <<< "$(security cms -D -i "$RUNNER_TEMP/profile.mobileprovision")" 2>/dev/null)

          if [ -z "$PROFILE_UUID" ]; then
            # Fallback: use grep to extract UUID if PlistBuddy fails
            PROFILE_UUID=$(grep -a -A 1 "UUID" "$RUNNER_TEMP/profile.mobileprovision" \
              | grep string | head -1 | sed 's/.*<string>\(.*\)<\/string>.*/\1/')
          fi

          cp "$RUNNER_TEMP/profile.mobileprovision" "$PROFILE_DIR/${PROFILE_UUID}.mobileprovision"

          echo "profile_uuid=${PROFILE_UUID}" >> "$GITHUB_OUTPUT"
          echo "✅ Provisioning profile installed (UUID: ${PROFILE_UUID})"
        id: profile

      # ─────────────────────────────────────────────────────────────────
      # Configure CMake for iOS (Xcode generator required for signing)
      # ─────────────────────────────────────────────────────────────────
      - name: Configure CMake for iOS
        run: |
          export PATH="$QT_INSTALL_DIR/$QT_VERSION/ios/bin:$PATH"

          cmake -G Xcode \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_INSTALL_DIR/$QT_VERSION/ios" \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -B build-ios -S .

          echo "✅ CMake configured"

      # ─────────────────────────────────────────────────────────────────
      # Build iOS app (archive)
      # ─────────────────────────────────────────────────────────────────
      - name: Build and archive iOS app
        run: |
          xcodebuild archive \
            -project build-ios/NetDiagnostic.xcodeproj \
            -scheme net_diagnostic \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build-ios/NetDiagnostic.xcarchive \
            DEVELOPMENT_TEAM="${{ secrets.IOS_TEAM_ID }}" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="${{ steps.profile.outputs.profile_uuid }}" \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            -verbose 2>&1 | tail -100

          echo "✅ Archive created"

      # ─────────────────────────────────────────────────────────────────
      # Generate ExportOptions.plist dynamically
      # ─────────────────────────────────────────────────────────────────
      - name: Generate ExportOptions.plist
        run: |
          cat > build-ios/ExportOptions.plist << PLISTEOF
      <?xml version="1.0" encoding="UTF-8"?>
      <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
      <plist version="1.0">
      <dict>
          <key>method</key>
          <string>app-store</string>
          <key>teamID</key>
          <string>${{ secrets.IOS_TEAM_ID }}</string>
          <key>signingStyle</key>
          <string>manual</string>
          <key>provisioningProfiles</key>
          <dict>
              <key>${BUNDLE_ID}</key>
              <string>${{ steps.profile.outputs.profile_uuid }}</string>
          </dict>
          <key>uploadSymbols</key>
          <false/>
          <key>manageAppVersionAndBuildNumber</key>
          <false/>
      </dict>
      </plist>
      PLISTEOF
          echo "✅ ExportOptions.plist generated"

      # ─────────────────────────────────────────────────────────────────
      # Export IPA
      # ─────────────────────────────────────────────────────────────────
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build-ios/NetDiagnostic.xcarchive \
            -exportPath build-ios/output \
            -exportOptionsPlist build-ios/ExportOptions.plist \
            -allowProvisioningUpdates

          echo "✅ IPA exported"
          ls -lh build-ios/output/

      # ─────────────────────────────────────────────────────────────────
      # Upload to TestFlight via altool
      # ─────────────────────────────────────────────────────────────────
      - name: Upload to TestFlight
        run: |
          IPA_PATH=$(find build-ios/output -name "*.ipa" | head -1)

          if [ -z "$IPA_PATH" ]; then
            echo "ERROR: No .ipa found in build-ios/output/"
            ls -R build-ios/output/
            exit 1
          fi

          echo "Uploading ${IPA_PATH} to TestFlight..."

          # Write key to Apple's expected location
          mkdir -p ~/.appstoreconnect/private_keys
          cp "$ASC_KEY_DIR/key.p8" \
            ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPSTORE_CONNECT_KEY_ID }}.p8

          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey "${{ secrets.APPSTORE_CONNECT_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}" \
            --verbose

          echo "✅ Uploaded to TestFlight — check App Store Connect for processing status"

      # ─────────────────────────────────────────────────────────────────
      # Clean up key files
      # ─────────────────────────────────────────────────────────────────
      - name: Clean up
        if: always()
        run: |
          rm -rf "$ASC_KEY_DIR"
          rm -f ~/.appstoreconnect/private_keys/AuthKey_*.p8
